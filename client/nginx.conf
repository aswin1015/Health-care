server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Gateway (Unified Backend) ─────────────────────────────────────
    location /api/ {
        proxy_pass         https://api-gateway.icysmoke-c02140c0.centralindia.azurecontainerapps.io/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify   off;
        proxy_set_header   Host              api-gateway.icysmoke-c02140c0.centralindia.azurecontainerapps.io;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass         https://api-gateway.icysmoke-c02140c0.centralindia.azurecontainerapps.io;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify   off;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              api-gateway.icysmoke-c02140c0.centralindia.azurecontainerapps.io;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Error pages ───────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
