# ─── Azure Key Vault CSI SecretProviderClass ──────────────────────────────────
# Syncs secrets from Azure Key Vault → Kubernetes Secret "aegis-kv-secrets".
# Any pod that mounts the "secrets-store" CSI volume triggers this sync.
# Placeholders are substituted by provision-aks.ps1 at deploy time.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aegis-kv-secret-provider
  namespace: aegis
spec:
  provider: azure
  secretObjects:
    # This block creates a K8s Secret from the KV secrets
    - secretName: aegis-kv-secrets
      type: Opaque
      data:
        - objectName: kv-mongodb-uri
          key: MONGODB_URI
        - objectName: kv-jwt-secret
          key: JWT_SECRET
        - objectName: kv-postgres-url
          key: DATABASE_URL
        - objectName: kv-postgres-password
          key: POSTGRES_PASSWORD
        - objectName: kv-azure-storage-conn
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: kv-gemini-api-key
          key: GEMINI_API_KEY
        - objectName: kv-azure-ai-endpoint
          key: AZURE_AI_ENDPOINT
        - objectName: kv-azure-ai-key
          key: AZURE_AI_KEY
        - objectName: kv-appinsights-conn
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
  parameters:
    usePodIdentity: "false"
    clientID: "__MANAGED_IDENTITY_CLIENT_ID__"
    keyvaultName: "__KEY_VAULT_NAME__"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: kv-mongodb-uri
          objectType: secret
        - |
          objectName: kv-jwt-secret
          objectType: secret
        - |
          objectName: kv-postgres-url
          objectType: secret
        - |
          objectName: kv-postgres-password
          objectType: secret
        - |
          objectName: kv-azure-storage-conn
          objectType: secret
        - |
          objectName: kv-gemini-api-key
          objectType: secret
        - |
          objectName: kv-azure-ai-endpoint
          objectType: secret
        - |
          objectName: kv-azure-ai-key
          objectType: secret
        - |
          objectName: kv-appinsights-conn
          objectType: secret
    tenantId: "__TENANT_ID__"
