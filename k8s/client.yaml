apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  labels:
    app: aegis
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: aegis-client:latest # Replace with actual registry tag (e.g. acr.azurecr.io/client:v1)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "20m"
              memory: "32Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: client
  labels:
    app: aegis
    tier: frontend
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: client
  type: ClusterIP
