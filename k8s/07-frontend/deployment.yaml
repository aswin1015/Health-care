apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: aegis
  labels:
    app: client
    app.kubernetes.io/part-of: aegis-health
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      volumes:
        # Override the nginx.conf baked into the Docker image.
        # In K8s, we serve static files only — KGateway handles /api/* routing.
        - name: nginx-config
          configMap:
            name: client-nginx-config
      containers:
        - name: client
          image: __ACR_NAME__.azurecr.io/client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: aegis
  labels:
    app: client
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
