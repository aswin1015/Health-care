apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  labels:
    app: aegis
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      serviceAccountName: aegis-client
      containers:
        - name: client
          image: aegis-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            limits:
              cpu: "200m"
              memory: "128Mi"
            requests:
              cpu: "20m"
              memory: "32Mi"
