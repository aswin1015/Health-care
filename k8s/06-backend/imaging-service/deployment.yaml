# ─── Imaging Service Deployment ───────────────────────────────────────────────
# FastAPI microservice. Stores images in Azure Blob Storage; metadata in PostgreSQL.
# Azure Blob Storage connection string comes from Key Vault.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imaging-service
  namespace: aegis
  labels:
    app: imaging-service
    app.kubernetes.io/part-of: aegis-health
    tier: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imaging-service
  template:
    metadata:
      labels:
        app: imaging-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aegis-workload-identity
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: aegis-kv-secret-provider
      containers:
        - name: imaging-service
          image: __ACR_NAME__.azurecr.io/imaging-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
              name: http
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          envFrom:
            - secretRef:
                name: aegis-kv-secrets
            - configMapRef:
                name: aegis-config
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: imaging-service
  namespace: aegis
  labels:
    app: imaging-service
spec:
  selector:
    app: imaging-service
  ports:
    - port: 5004
      targetPort: 5004
      name: http
  type: ClusterIP
