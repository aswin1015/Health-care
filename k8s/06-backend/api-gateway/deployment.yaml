# ─── API Gateway Deployment ───────────────────────────────────────────────────
# Central orchestrator. Routes traffic to all backend microservices.
# Image tag replaced by provision-aks.ps1: __ACR_NAME__ → actual ACR login server.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aegis
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: aegis-health
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aegis-workload-identity
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: aegis-kv-secret-provider
      containers:
        - name: api-gateway
          image: __ACR_NAME__.azurecr.io/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          envFrom:
            - secretRef:
                name: aegis-kv-secrets
            - configMapRef:
                name: aegis-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 8
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "600m"
              memory: "512Mi"
