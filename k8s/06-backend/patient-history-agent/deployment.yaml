apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-history-agent
  namespace: aegis
  labels:
    app: patient-history-agent
    app.kubernetes.io/part-of: aegis-health
    tier: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-history-agent
  template:
    metadata:
      labels:
        app: patient-history-agent
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aegis-workload-identity
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: aegis-kv-secret-provider
      containers:
        - name: patient-history-agent
          image: __ACR_NAME__.azurecr.io/patient-history-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          envFrom:
            - secretRef:
                name: aegis-kv-secrets
            - configMapRef:
                name: aegis-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 8
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-history-agent
  namespace: aegis
  labels:
    app: patient-history-agent
spec:
  selector:
    app: patient-history-agent
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  type: ClusterIP
