apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-records-service
  labels:
    app: health-records-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-records-service
  template:
    metadata:
      labels:
        app: health-records-service
    spec:
      containers:
        - name: health-records-service
          image: aegis/health-records-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: MONGODB_URI
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: health-records-service
  labels:
    app: health-records-service
spec:
  selector:
    app: health-records-service
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  type: ClusterIP
