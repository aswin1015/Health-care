apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: aegis
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: aegis-api-gateway:latest # Replace with actual registry tag (e.g. acr.azurecr.io/api-gateway:v1)
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: PORT
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: aegis-config
                  key: MONGODB_URI
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aegis-secret
                  key: GEMINI_API_KEY
          # Health Checks (Readiness & Liveness Probes)
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 8
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 12
            timeoutSeconds: 3
            failureThreshold: 3
          # Resource Bounds
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: aegis
    tier: backend
spec:
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  selector:
    app: api-gateway
  type: ClusterIP
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  labels:
    app: aegis
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
