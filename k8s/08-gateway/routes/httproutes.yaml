# HTTPRoutes for use with Kubernetes Gateway API (e.g. Envoy Gateway, Istio Gateway API)
# These complement the nginx Ingress in ingress.yaml for clusters using Gateway API.
# Apply only if your cluster has the Gateway API CRDs installed.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aegis-api-route
  labels:
    app: aegis
spec:
  parentRefs:
    - name: aegis-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 5000
    - matches:
        - path:
            type: Exact
            value: /healthz
      backendRefs:
        - name: api-gateway
          port: 5000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aegis-frontend-route
  labels:
    app: aegis
spec:
  parentRefs:
    - name: aegis-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: client
          port: 80
