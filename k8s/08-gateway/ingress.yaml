apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-ingress
  labels:
    app: aegis
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # ── Health Records Service (port 5001) ────────────────────────────
          - path: /api/history(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: health-records-service
                port:
                  number: 5001
          - path: /api/appointments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: health-records-service
                port:
                  number: 5001

          # ── Medication Service (port 5002) ────────────────────────────────
          - path: /api/medications(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: medication-service
                port:
                  number: 5002
          - path: /api/caregiver(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: medication-service
                port:
                  number: 5002
          - path: /api/status(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: medication-service
                port:
                  number: 5002

          # ── AI Service (port 5003) ────────────────────────────────────────
          - path: /api/ai(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai-service
                port:
                  number: 5003

          # ── React SPA (catch-all → client nginx) ─────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
