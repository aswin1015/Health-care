# ─── Aegis Health — Demo Deployment ──────────────────────────────────────────
# Single-file manifest for AKS demo.
# Prerequisites:
#   kubectl create namespace aegis
#   kubectl create secret generic aegis-secrets -n aegis \   (see README below)
#   Images pushed to aegisdemoacr.azurecr.io
#
# Apply:  kubectl apply -f demo-deploy.yaml
# Access: kubectl get svc client-service -n aegis   (EXTERNAL-IP → port 80)
# ─────────────────────────────────────────────────────────────────────────────

# ── ConfigMap (non-secret config) ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
data:
  NODE_ENV: "production"
  PORT: "5000"
  HEALTH_RECORDS_SERVICE_URL: "http://health-records-service:5001"
  MEDICATION_SERVICE_URL: "http://medication-service:5002"
  AI_SERVICE_URL: "http://ai-service:5003"
  IMAGING_SERVICE_URL: "http://imaging-service:5004"
  DIAGNOSTICS_SERVICE_URL: "http://diagnostic-agent-service:5005"
  COORDINATOR_AGENT_URL: "http://coordinator-agent:8000"
  IMAGE_ANALYSIS_AGENT_URL: "http://image-analysis-agent:8001"
  PATIENT_HISTORY_AGENT_URL: "http://patient-history-agent:8002"
  TZ: "Asia/Kolkata"

---
# ─── MongoDB ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: aegis
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "ai-health-agent"
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: aegis
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# ─── PostgreSQL ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: aegis
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "aegis_imaging"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aegis
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ─── Azurite (local blob storage emulator) ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite
          ports:
            - containerPort: 10000
            - containerPort: 10001
            - containerPort: 10002
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  namespace: aegis
spec:
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000
    - name: queue
      port: 10001
      targetPort: 10001
    - name: table
      port: 10002
      targetPort: 10002

