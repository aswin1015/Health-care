              value: "Asia/Kolkata"
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }

---
# ─── API Gateway (port 5000 — ClusterIP, nginx proxies to it) ─────────────────
# Service name MUST stay "api-gateway" — nginx.conf proxies /api/ → http://api-gateway:5000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: aegisdemoacr.azurecr.io/api-gateway:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aegis-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet: { path: /healthz, port: 5000 }
            initialDelaySeconds: 25
            periodSeconds: 10
          resources:
            requests: { cpu: "150m", memory: "192Mi" }
            limits:   { cpu: "600m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aegis
spec:
  selector:
    app: api-gateway
  ports:
    - port: 5000
      targetPort: 5000

---
# ─── React Frontend (LoadBalancer — the only public-facing service) ────────────
# nginx proxies /api/* and /socket.io/* to api-gateway:5000 internally.
# Single public IP on port 80 is all that's needed for the demo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: aegisdemoacr.azurecr.io/client:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: aegis
spec:
  type: LoadBalancer
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
