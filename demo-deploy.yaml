# ─── Notification Worker (background — no Service) ────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-worker
  template:
    metadata:
      labels:
        app: notification-worker
    spec:
      containers:
        - name: notification-worker
          image: aegisdemoacr.azurecr.io/notification-worker:latest
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: MONGODB_URI
