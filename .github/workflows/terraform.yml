name: 🏗️ Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform-state-locking/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform-state-locking/**"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: terraform-state-locking

  # Azure auth — set these in GitHub → Settings → Secrets → Actions
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  # Sensitive Terraform variables
  TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
  TF_VAR_container_registry_username: ${{ secrets.TF_VAR_CONTAINER_REGISTRY_USERNAME }}
  TF_VAR_container_registry_password: ${{ secrets.TF_VAR_CONTAINER_REGISTRY_PASSWORD }}
  TF_VAR_form_recognizer_key: ${{ secrets.TF_VAR_FORM_RECOGNIZER_KEY }}

permissions:
  contents: read
  pull-requests: write  # needed to post plan as PR comment

jobs:
  # ─── Terraform Plan ──────────────────────────────────────────────────────────
  plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}

    steps:
      - name: ⬇️ Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # fetch terraform-state-locking submodule

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: 📦 Terraform Init
        id: init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=aswin-rg" \
            -backend-config="storage_account_name=aegishealthstorage" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate" \
            -input=false

      - name: ✅ Terraform Validate
        id: validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate -no-color

      - name: 🎨 Terraform Format Check
        id: fmt
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive -no-color
        continue-on-error: true

      - name: 📋 Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color \
            -input=false \
            -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 💾 Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5

      # ── Post plan output as a PR comment ─────────────────────────────────────
      - name: 💬 Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (output truncated)'
              : planOutput;

            const fmtStatus = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '⚠️';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = `## 🏗️ Terraform Plan Results

            | Step | Status |
            |------|--------|
            | 🔧 Init | ✅ |
            | ✅ Validate | ${validateStatus} |
            | 🎨 Format | ${fmtStatus} |
            | 📋 Plan | ${planStatus} |

            <details>
            <summary>📋 Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > 💡 Merge this PR to trigger **Terraform Apply** automatically.
            > 🔒 Plan file saved as artifact for 5 days.

            *Triggered by: @${{ github.actor }} · Commit: \`${{ github.sha }}\`*`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🏗️ Terraform Plan Results')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: ❌ Fail if plan failed
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

  # ─── Terraform Apply (only on push to main) ──────────────────────────────────
  apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    # Apply only when merging to main (not on PRs, not when plan had no changes)
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment:
      name: production   # requires manual approval if configured in repo settings
      url: http://52.140.120.67

    steps:
      - name: ⬇️ Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 📦 Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=aswin-rg" \
            -backend-config="storage_account_name=aegishealthstorage" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate" \
            -input=false

      - name: ⬇️ Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: 🚀 Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: 📊 Output summary
        if: always()
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## 🚀 Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | http://52.140.120.67 |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Applied by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  # ─── Terraform Destroy (manual only) ─────────────────────────────────────────
  destroy:
    name: 💣 Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment:
      name: production  # requires manual approval

    steps:
      - name: ⬇️ Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 📦 Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=aswin-rg" \
            -backend-config="storage_account_name=aegishealthstorage" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate" \
            -input=false

      - name: 💣 Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform destroy \
            -var-file="terraform.tfvars" \
            -auto-approve \
            -input=false
